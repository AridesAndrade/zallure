name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (frontend)
        run: cd cliente && pnpm install

      - name: Build frontend
        run: cd cliente && pnpm run build

      - name: Check dist exists
        run: ls -R cliente/dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cliente/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
